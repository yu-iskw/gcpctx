name: Mise toolchain

on:
  pull_request:
    paths:
      - .github/workflows/mise_toolchain.yml
      - mise.toml
      - mise.lock
      - .trunk/trunk.yaml
      - Makefile
      - dev/setup-tools.sh
      - dev/codeql-platform.sh
      - dev/test-mise-toolchain.sh
      - dev/codeql.sh
  push:
    branches:
      - main
    paths:
      - .github/workflows/mise_toolchain.yml
      - mise.toml
      - mise.lock
      - .trunk/trunk.yaml
      - Makefile
      - dev/setup-tools.sh
      - dev/codeql-platform.sh
      - dev/test-mise-toolchain.sh

permissions:
  contents: read

jobs:
  mise-toolchain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true
          cache: true

      - name: Smoke test mise integration
        run: bash ./dev/test-mise-toolchain.sh

      - name: Verify Makefile delegates to mise run (no wrapper script)
        run: |
          test ! -e dev/mise-exec.sh
          grep -q 'mise run lint' Makefile
          ! grep -q '^MISE_EXEC' Makefile
