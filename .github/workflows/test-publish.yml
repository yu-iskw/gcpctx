name: Test publish (testpypi)

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: package version
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          pip install -r requirements.setup.txt
      - name: Test publish
        env:
          UV_PUBLISH_TOKEN: "${{ secrets.TESTPYPI_API_TOKEN }}"
          PACKAGE_VERSION: "${{ inputs.package_version }}"
        run: |
          bash dev/publish.sh testpypi

  test-published-package:
    needs:
      - publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: bash
    env:
      PYTHON_PACKAGE_NAME: gcpctx
      PYTHON_NAME_SPACE: gcpctx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install packages
        env:
          PACKAGE_VERSION: "${{ inputs.package_version }}"
        run: |
          python3 -m pip install -U pip
          python3 -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            --force-reinstall \
            -U "${PYTHON_PACKAGE_NAME}==${PACKAGE_VERSION}"
      - name: Sleep
        run: |
          sleep 30
      - name: Test package
        run: |
          python3 -m "${PYTHON_NAME_SPACE}"
