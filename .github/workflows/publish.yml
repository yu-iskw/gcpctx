name: Publish (pypi)

on:
  release:
    types:
      - created

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/gcpctx
    permissions:
      id-token: write
      contents: write
      attestations: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          pip install -r requirements.setup.txt
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$RELEASE_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release tag ${RELEASE_TAG} (version ${RELEASE_VERSION}) != pyproject version ${PACKAGE_VERSION}"
            exit 1
          fi
      - name: Build distributions
        run: |
          uv build
      - name: Generate SBOM
        run: |
          mkdir -p release-artifacts
          uv export --frozen --no-dev --no-hashes --no-emit-project \
            -o release-artifacts/requirements-release.txt
          cyclonedx-py requirements \
            --output-file release-artifacts/gcpctx-sbom.json \
            --pyproject pyproject.toml \
            release-artifacts/requirements-release.txt
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Upload release artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            release-artifacts/gcpctx-sbom.json

  test-published-package:
    needs:
      - publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: bash
    env:
      PYTHON_PACKAGE_NAME: gcpctx
      PYTHON_NAME_SPACE: gcpctx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Sleep
        run: |
          sleep 60
      - name: Install package
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python3 -m pip install -U pip
          RELEASE_VERSION="${RELEASE_TAG#v}"
          python3 -m pip install -U "gcpctx==${RELEASE_VERSION}"
      - name: Test package
        run: |
          python3 -m "${{ env.PYTHON_NAME_SPACE }}" --help
