name: Publish (pypi)

on:
  release:
    types:
      - created

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/gcpctx
    permissions:
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          pip install -r requirements.setup.txt
      - name: Build distributions
        run: |
          uv build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@v1.14.0

  test-published-package:
    needs:
      - publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        shell: bash
    env:
      PYTHON_PACKAGE_NAME: gcpctx
      PYTHON_NAME_SPACE: gcpctx
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"
      # It takes some time when the package gets available.
      - name: Sleep
        run: |
          sleep 30
      - name: Install package
        run: |
          python3 -m pip install -U "${{ env.PYTHON_PACKAGE_NAME}}"
      - name: Test package
        run: |
          python3 -m "${{ env.PYTHON_NAME_SPACE }}"
